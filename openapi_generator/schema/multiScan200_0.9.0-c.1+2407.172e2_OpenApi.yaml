          $ref: '#/components/schemas/ResponseHeader'
         data:
           type: object
           properties: 
            CidVersionStruct:
             $ref: '#/components/schemas/CidVersion'
 /SOPASVersion:
  get: 
   tags: 
   - V100
   summary: ""
   description: 'Version of SOPAS runtime (SOPAS DCD).'
   operationId: Get/SOPASVersion
