openapi: 3.0.1
info: 
 description: "This is the REST interface description of the LRS4000. The range of functions can vary depending on the variant and software package."
 contact: 
  name: Python Examples GitHub
  url: https://github.com/SICKAG/sick_scan_rest_client
 version: "1.9.1.0R"
 x-sick-openapi-generator-version: 1.2.0-b.1
 title: "LRS4000 REST interface description"
servers: 
- url: http://{device}/api
  variables: 
   device: 
    default: 192.168.0.1
    description: The IP address of the LRS4000.
tags: 
- name: 1 - General
- name: 2 - Status
- name: 3 - Device
- name: 4 - Basic settings
- name: 5 - Date and system time
- name: 6 - Filter
- name: 7 - Contamination indication
- name: 8 - Ethernet
- name: 9 - Leagcy protocols
- name: 10 - Webserver settings
- name: 11 - Inputs and outputs
- name: 12 - Data output
- name: 13 - IMU data output
- name: 14 - Region of interest
- name: 15 - Field evaluation
- name: 16 - Operating data
- name: 17 - 3D scan recording
- name: 18 - Motor synchronization
- name: 19- Encoder
- name: 20-Diagnostic file
- name: 21 - Detection History
paths: 
 /DeviceIdent:
  get: 
   tags: 
   - 3 - Device
   summary: ""
   description: 'Returns the device name and firmware version.'
   operationId: Get/DeviceIdent
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        required: ["header"]
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
          type: object
          properties: 
           Name:
            type: string
            default: "LRSNAV"
            maxLength: 20
           Version:
            type: string
            default: "1.9.1.0R"
            maxLength: 32
