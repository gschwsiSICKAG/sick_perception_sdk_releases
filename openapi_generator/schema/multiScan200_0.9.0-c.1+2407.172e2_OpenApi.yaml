 /GetUserLevelPasswordState:
  post: 
   tags: 
   - V200
   summary: ""
   description: |
    Post GetUserLevelPasswordState.

     This function requires at least user level: Maintenance.
   operationId: Post/GetUserLevelPasswordState
   requestBody:
    description: successful operation
    required: true
    content: 
     application/json: 
      schema: 
       type: object
       properties: 
        header:
         $ref: '#/components/schemas/PostBodyHeader'
        data:
         type: object
