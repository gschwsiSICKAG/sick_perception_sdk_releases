 /InertialMeasurementUnit:
  get: 
   tags: 
   - General
   summary: ""
   description: 'Provides access to the data of an InertialMeasurementUnit (IMU) which offers - depending on the used hardware - information about acceleration, angular velocity, magnetic field and the orientation. If one of these quantities is not available the respective values are set to 0. The data is given in the following coordinate system which is based on the DIN70000 system: The x-axis lies on the 90° beam of the 0° layer. The y-axis is perpendicular to the x-axis and lies in the 0° layer. The y-values are rising in the counter clock wise rotation direction (right handed system). The z-axis is perpendicular to the x-y-plane and the scanner top points to rising z-values. If no magnetic field sensor is available the heading.'
   operationId: Get/InertialMeasurementUnit
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
          type: object
          properties: 
           Acceleration:
            type: array
            maxItems: 3
            minItems: 0
            default: []
            items: 
             type: number
             default: 0.0
           AngularVelocity:
            type: array
            maxItems: 3
            minItems: 0
            default: []
            items: 
             type: number
             default: 0.0
           Orientation:
            type: array
            maxItems: 4
            minItems: 0
            default: []
            items: 
             type: number
             default: 0.0
           TimeStamp:
            type: integer
  post: 
   tags: 
   - General
   summary: ""
   description: 'Provides access to the data of an InertialMeasurementUnit (IMU) which offers - depending on the used hardware - information about acceleration, angular velocity, magnetic field and the orientation. If one of these quantities is not available the respective values are set to 0. The data is given in the following coordinate system which is based on the DIN70000 system: The x-axis lies on the 90° beam of the 0° layer. The y-axis is perpendicular to the x-axis and lies in the 0° layer. The y-values are rising in the counter clock wise rotation direction (right handed system). The z-axis is perpendicular to the x-y-plane and the scanner top points to rising z-values. If no magnetic field sensor is available the heading.'
   operationId: Post/InertialMeasurementUnit
   requestBody:
    description: successful operation
    required: true
    content: 
     application/json: 
      schema: 
       type: object
       properties: 
        data:
         type: object
         properties: 
          InertialMeasurementUnit:
           type: object
           properties: 
            Acceleration:
             type: array
             maxItems: 3
             minItems: 0
             default: []
             items: 
              type: number
              default: 0.0
            AngularVelocity:
             type: array
             maxItems: 3
             minItems: 0
             default: []
             items: 
              type: number
              default: 0.0
            Orientation:
             type: array
             maxItems: 4
             minItems: 0
             default: []
             items: 
              type: number
              default: 0.0
            TimeStamp:
             type: integer
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
