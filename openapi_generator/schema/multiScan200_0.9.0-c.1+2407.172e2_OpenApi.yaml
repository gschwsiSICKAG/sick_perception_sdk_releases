         data:
          type: object
          properties: 
           realm:
            type: string
            default: " "
           nonce:
            type: string
            default: " "
           opaque:
            type: string
            default: " "
           salt:
            type: array
            maxItems: 16
            minItems: 0
            default: []
            items: 
             type: integer
 /SetUserLevel:
  post: 
   tags: 
   - V200
   summary: ""
   description: 'Post SetUserLevel.'
   operationId: Post/SetUserLevel
   requestBody:
    description: successful operation
    required: true
    content: 
     application/json: 
      schema: 
       type: object
       properties: 
        data:
         type: object
         properties: 
          challengeResponse:
           type: array
           maxItems: 32
           minItems: 32
           items: 
            type: integer
          userLevel:
           $ref: '#/components/schemas/E_USER_LEVEL_TYPE'
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
          type: object
          properties: 
           result:
            type: integer
            default: 0
            enum: 
            - 0
            - 2
            - 3
            - 5
            description: >
             Mapping:
              * 0 - SUCCESS
              * 2 - NOT_ACCEPTED
              * 3 - UNKNOWN_CHALLENGE
              * 5 - TIMELOCK_ACTIVE
