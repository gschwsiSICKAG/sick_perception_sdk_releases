             default: []
             items: 
              type: object
              properties: 
               Id:
                type: string
                default: " "
                maxLength: 100
               State:
                type: integer
                default: 0
                enum: 
                - 0
                - 1
                - 2
                - 3
                description: >
                 Mapping:
                  * 0 - UNKNOWN
                  * 1 - ACTIVE
                  * 2 - INACTIVE
                  * 3 - ACTIVE_BEFORE_REBOOT
               NotificationGroup:
                type: integer
               Severity:
                type: integer
                default: 0
                enum: 
                - 0
                - 1
                - 2
                - 3
                description: >
                 Mapping:
                  * 0 - INFO
                  * 1 - WARNING
                  * 2 - ERROR
                  * 3 - FATAL_ERROR
               FirstOccurrence:
                $ref: '#/components/schemas/NotificationTimeType'
               LastOccurrence:
                $ref: '#/components/schemas/NotificationTimeType'
               LastResolved:
                $ref: '#/components/schemas/NotificationTimeType'
               OccurrenceCount:
                type: integer
               AdditionalInfo:
                type: string
                default: " "
                maxLength: 300
