 /CIDChecksum:
  get: 
   tags: 
   - Optional
   summary: ""
   description: 'Checksum of CID which was used to generate the SRT.'
   operationId: Get/CIDChecksum
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
           type: object
           properties: 
            CIDChecksum:
             type: array
             maxItems: 16
             minItems: 0
             default: [ 0xA0, 0xCE, 0xC5, 0xC8, 0xF6, 0x02, 0x98, 0xB9, 0x8B, 0x19, 0xE8, 0x96, 0x69, 0x2A, 0x0D, 0x9E]
             items: 
              type: integer
 /SubDevicesExt:
  get: 
   tags: 
   - Optional
   summary: ""
   description: 'Get SubDevicesExt.'
   operationId: Get/SubDevicesExt
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
          type: object
          properties: 
           Addresses:
            type: array
            maxItems: 63
            minItems: 0
            default: []
            items: 
             type: object
             properties: 
              usiSubAddress:
               type: integer
              xProperties:
               type: object
               properties: 
                bVisible:
                 type: boolean
                 default: false
                eProtocol:
                 type: integer
                 default: 0
                 enum: 
                 - 0
                 - 1
                 - 2
                 - 3
                 description: >
                  Mapping:
                   * 0 - eProtNotDefined
                   * 1 - eProtCoLaA
                   * 2 - eProtCoLaB
                   * 3 - eProtSerialLink
           reserved:
            type: array
            maxItems: 4
            minItems: 0
            default: []
            items: 
             type: integer
             maximum: 0
 /getChallenge:
  post: 
   tags: 
   - V200
   summary: ""
   description: 'Post getChallenge.'
   operationId: Post/getChallenge
   requestBody:
    description: successful operation
    required: true
    content: 
     application/json: 
      schema: 
       type: object
       properties: 
