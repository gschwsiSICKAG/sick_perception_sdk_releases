           type: object
           properties: 
            enable:
             type: boolean
             default: False
            outerRoiStartAngle:
             type: integer
             minimum: -900000
             maximum: 900000
             default: -250000
            outerRoiStopAngle:
             type: integer
             minimum: -900000
             maximum: 900000
             default: 250000
            innerRoiStartAngle:
             type: integer
             minimum: -900000
             maximum: 900000
             default: -100000
            innerRoiStopAngle:
             type: integer
             minimum: -900000
             maximum: 900000
             default: 100000
            outerRoiIndexIncrement:
             type: integer
             minimum: 1
             maximum: 50
             default: 2
            innerRoiIndexIncrement:
             type: integer
             minimum: 1
