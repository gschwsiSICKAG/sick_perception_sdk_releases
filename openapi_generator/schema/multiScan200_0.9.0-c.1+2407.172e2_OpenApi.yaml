- name:  EIB
- name:  EID
- name:  EthernetCal
- name:  Eyesafety
- name:  FD
- name:  fileMethods
- name:  FirmwareSigning
- name:  frameHDoutputVisualization
- name:  FS2B
- name:  General
- name:  GroupEval
- name:  IOData
- name:  IOWiring
- name:  LedCalib
- name:  MinimizeAttackSurface
- name:  MS
- name:  NotificationService
- name:  ObjectDetection
- name:  ObjectDetectionApplicationInfo
- name:  ObjectDetectionDeveloperParameters
- name:  OpData
- name:  Optional
- name:  outputModeParameters
- name:  ParamBackup
- name:  ParamBackupDeveloper
- name:  Parameters
- name:  reductionRoiParameter
- name:  reverseProxy
- name:  SC
