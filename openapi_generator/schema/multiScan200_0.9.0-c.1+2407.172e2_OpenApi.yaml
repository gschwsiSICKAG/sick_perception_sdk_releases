openapi: 3.0.1
info: 
 description: "This is the REST interface description of the multiScan200 family. The range of functions can vary depending on the variant and software package."
 contact: 
  name: Python Examples GitHub
  url: https://github.com/SICKAG/sick_scan_rest_client
 version: 0.9.0-c.1+2407.172e2
 title: "multiScan200 REST interface description"
servers: 
- url: http://{device}/api
  variables: 
   device: 
    default: 192.168.0.1
    description: The IP address of the multiScan200.
tags: 
- name:  AppOutputParameters
- name:  AppSpace
- name:  certificateBundle
- name:  Clocks
- name:  CoLa2
- name:  Delivery
- name:  DeviceInformation
- name:  DIB
