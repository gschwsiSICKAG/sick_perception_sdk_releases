 /verticalAngleRangeFilter:
  get: 
   tags: 
   - reductionRoiParameter
   summary: ""
   description: 'Restrict the streaming data output to a vertical field of view. The parameters allow for two different regions of interest (ROI) with an outer and an inner ROI. Each ROI has its own subsampling factor. The outer ROI is specified by the angle range [outerRoiStartAngle, outerRoiStopAngle]. The inner ROI is specified by the angle range [innerRoiStartAngle, innerRoiStopAngle]. The inner ROI is supposed to be contained completely inside the outer ROI; if the ROI does not lay completely in the outer ROI the device will raise a parameterization error.'
   operationId: Get/verticalAngleRangeFilter
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
          type: object
          properties: 
           enable:
            type: boolean
            default: False
           outerRoiStartAngle:
            type: integer
            minimum: -900000
            maximum: 900000
            default: -250000
           outerRoiStopAngle:
            type: integer
            minimum: -900000
            maximum: 900000
            default: 250000
           innerRoiStartAngle:
            type: integer
            minimum: -900000
            maximum: 900000
            default: -100000
           innerRoiStopAngle:
            type: integer
            minimum: -900000
            maximum: 900000
            default: 100000
           outerRoiIndexIncrement:
            type: integer
            minimum: 1
            maximum: 50
            default: 2
           innerRoiIndexIncrement:
            type: integer
            minimum: 1
            maximum: 50
            default: 1
