- name:  Update
- name:  UserDefaultParameters
- name:  V100
- name:  V200
paths: 
 /checkCredentials:
  post: 
   tags: 
   - SICK Device REST interface description
   summary: ""
   description: 'Check credentials.'
   operationId: Post/checkCredentials
   requestBody:
    description: successful operation
    required: true
    content: 
     application/json: 
      schema: 
       type: object
       nullable: true
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
 /update:
  put: 
   tags: 
   - SICK Device REST interface description
   summary: ""
   description: "This method uploads the firmware file (SPK) to the sensor. The maximum possible file size is 100 MB."
   operationId: Put/update
   requestBody:
    content: 
     application/octet-stream:
      schema: 
       type: object
       properties: 
        data:
         type: object
         properties: 
          Type:
           type: string
          Binary:
           type: string
   responses: 
    '200':
     description: successful operation
 /crown/file:
  get: 
   tags: 
   - SICK Device REST interface description
   summary: ""
   description: "Downloads the diagnostic file (zip file) if one exists."
   operationId: Get/crown/file
   parameters: 
    - name: filePath
      in: query
      description: path
      required: true
      schema: 
       type: string
       example: diagnosisDump.zip
   responses: 
    '200':
     description: successful operation
     content: 
      application/zip: 
       schema: 
        type: string
        format: binary
    '400':
     description: bad operation
    '404':
     description: file not found
    '500':
     description: Server not found
 /parameterbackup:
  put: 
   tags: 
   - SICK Device REST interface description
   summary: ""
   description: "Upload the backup paramters."
   operationId: Put/parameterbackup
   requestBody:
    content: 
     multipart/form-data:
      schema: 
       type: object
       properties: 
        datei:
         type: string
         format: binary
         description: Json-Datei
   responses: 
    '200':
     description: successful operation
 /DeviceIdent:
  get: 
   tags: 
   - V100
   summary: ""
   description: 'Unique Identification of device.'
   operationId: Get/DeviceIdent
   responses: 
    '200':
     description: successful operation
     content: 
      application/json: 
       schema: 
        type: object
        properties: 
         header:
          $ref: '#/components/schemas/ResponseHeader'
         data:
          type: object
          properties: 
           Name:
            type: string
            default: "multiScan200"
            maxLength: 12
           Version:
            type: string
            default: "0.9.0.1C"
            maxLength: 8
 /CidVersion:
  get: 
   tags: 
   - V100
   summary: ""
   description: 'Version of communication interface description.'
   operationId: Get/CidVersion
   responses: 
    '200':
