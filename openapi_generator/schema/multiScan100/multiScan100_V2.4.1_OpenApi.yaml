openapi: 3.0.1
info:
  description: "This is the REST interface description of the multiScan100 family. The availability of functions can vary depending on the variant / software package."
  contact:
    name: SICK
    url: https://www.sick.com/
  version: 2.4.1
  title: "multiScan100 REST interface description"
servers:
  - url: http://{device}/api
    variables:
      device:
        default: 192.168.0.1
        description: The IP address of the multiScan100.
tags:
  - name: 1 - General
  - name: 2 - Status
  - name: 3 - Device
  - name: 4 - Basic settings
  - name: 5 - Date and system time
  - name: 6 - Filter
  - name: 7 - Mounting position
  - name: 8 - Contamination indication
  - name: 9 - Ethernet
  - name: 10 - Legacy protocols
  - name: 11 - Webserver settings
  - name: 12 - Inputs and outputs
  - name: 13 - Measurement data output
  - name: 14 - IMU data output
  - name: 15 - Data reduction
  - name: 16 - Region of interest
  - name: 17 - Field evaluation
  - name: 18 - Perpendicular distance
  - name: 19 - Operating data
  - name: 20 - Diagnostic file
  - name: 21 - Detection history
  - name: 22 - Firmware update
  - name: 23 - Cybersecurity
  - name: 24 - Backup/Restore
paths:
  /checkCredentials:
    post:
      tags:
        - 1 - General
      summary: ""
      description: "Returns authentication success. For more details see https://github.com/SICKAG/sick_scan_rest_client."
      operationId: Post/checkCredentials
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              nullable: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /update:
    put:
      tags:
        - 22 - Firmware update
      summary: ""
      description: "Transfers a firmware file (.spk) from the file location to the device. The maximum possible file size is 100 MB."
      operationId: Put/update
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    Type:
                      type: string
                    Binary:
                      type: string
      responses:
        "200":
          description: successful operation
  /crown/file:
    get:
      tags:
        - 20 - Diagnostic file
      summary: ""
      description: "Downloads the diagnostic file (zip file) if one exists."
      operationId: Get/crown/file
      parameters:
        - name: filePath
          in: query
          description: path
          required: true
          schema:
            type: string
            example: diagnosisDump.zip
      responses:
        "200":
          description: successful operation
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: bad operation
        "404":
          description: file not found
        "500":
          description: Server not found
  /parameterbackup:
    get:
      tags:
        - 24 - Backup/Restore
      summary: ""
      description: "Reads/transfers the backup file (.json) from/to the device."
      operationId: Get/parameterbackup
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  device identification:
                    type: string
                  checksum:
                    type: string
                  parameters:
                    type: array
                    items:
                      type: object
                      properties:
                        userlevel:
                          $ref: "#/components/schemas/E_USER_LEVEL_TYPE"
                        parameters:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              id:
                                type: string
                              value:
                                oneOf:
                                  - type: integer
                                  - type: boolean
                                  - type: string
                                  - type: object
                                  - type: number
    put:
      tags:
        - 24 - Backup/Restore
      summary: ""
      description: "Reads/transfers the backup file (.json) from/to the device."
      operationId: Put/parameterbackup
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                datei:
                  type: string
                  format: binary
                  description: Json-Datei
      responses:
        "200":
          description: successful operation
  /DeviceIdent:
    get:
      tags:
        - 3 - Device
      summary: ""
      description: "Returns the device name and the firmware version."
      operationId: Get/DeviceIdent
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      Name:
                        type: string
                        default: "multiScan"
                        maxLength: 9
                      Version:
                        type: string
                        default: "2.4.1.0R"
                        maxLength: 8
  /LocationName:
    get:
      tags:
        - 3 - Device
      summary: ""
      description: "Returns/sets the device name."
      operationId: Get/LocationName
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      LocationName:
                        type: string
                        default: "not defined"
                        maxLength: 32
    post:
      tags:
        - 3 - Device
      summary: ""
      description: |
        Returns/sets the device name.

         This function requires at least user level: Authorized Client.
      operationId: Post/LocationName
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    LocationName:
                      type: string
                      default: "not defined"
                      maxLength: 32
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /SerialNumber:
    get:
      tags:
        - 3 - Device
      summary: ""
      description: "Returns the serial number."
      operationId: Get/SerialNumber
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      SerialNumber:
                        type: string
                        default: "123456789"
                        maxLength: 9
  /FirmwareVersion:
    get:
      tags:
        - 3 - Device
      summary: ""
      description: "Returns the current firmware version."
      operationId: Get/FirmwareVersion
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      FirmwareVersion:
                        type: string
                        default: "XXXXXXXXXX"
                        maxLength: 40
  /SetPassword:
    post:
      tags:
        - 1 - General
      summary: ""
      description: "Sets the password for the CoLa A/B interface only. In this example the password for user level: Service (4) is set to - test - (integer value of the password hash - test -). For more details see https://github.com/SICKAG/sick_scan_rest_client."
      operationId: Post/SetPassword
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    siUserLevel:
                      type: integer
                    udiNewPassword:
                      type: integer
                  example:
                    siUserLevel: 4
                    udiNewPassword: 3410122659
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      bSuccess:
                        type: boolean
                        default: false
  /getChallenge:
    post:
      tags:
        - 1 - General
      summary: ""
      description: Returns a challenge for the challenge and response authentication method. For more details see https://github.com/SICKAG/sick_scan_rest_client
      operationId: Psot
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    user:
                      $ref: "#/components/schemas/E_USER_LEVEL_TYPE"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  challenge:
                    type: object
                    properties:
                      realm:
                        type: string
                        default: " "
                      nonce:
                        type: string
                        default: " "
                      opaque:
                        type: string
                        default: " "
                      salt:
                        type: array
                        maxItems: 16
                        minItems: 0
                        default: []
                        items:
                          type: integer
  /changePassword:
    post:
      tags:
        - 1 - General
      summary: ""
      description: "Sets the password for the REST interface. For more details see https://github.com/SICKAG/sick_scan_rest_client."
      operationId: Post/changePassword
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    encryptedMessage:
                      type: array
                      maxItems: 96
                      minItems: 0
                      default: []
                      items:
                        type: integer
                    userLevel:
                      $ref: "#/components/schemas/E_USER_LEVEL_TYPE"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      result:
                        type: integer
                        default: 0
                        enum:
                          - 0
                          - 2
                          - 4
                          - 5
                        description: >
                          Mapping:
                           * 0 - SUCCESS
                           * 2 - NOT_ACCEPTED
                           * 4 - PWD_NOT_CHANGABLE
                           * 5 - TIMELOCK_ACTIVE
  /EnableUserLevel:
    post:
      tags:
        - 1 - General
      summary: ""
      description: |
        Activates / deactivates a specific user level for the REST interface.

         This function requires at least user level: Service.
      operationId: Post/EnableUserLevel
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    userLevel:
                      type: integer
                    isEnabled:
                      type: boolean
                      default: false
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      result:
                        type: integer
                        default: 0
                        enum:
                          - 0
                          - 2
                        description: >
                          Mapping:
                           * 0 - SUCCESS
                           * 2 - NOT_ACCEPTED
  /OrderNumber:
    get:
      tags:
        - 3 - Device
      summary: ""
      description: "Returns the order number (SICK part number)."
      operationId: Get/OrderNumber
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      OrderNumber:
                        type: string
                        default: "1234567"
                        maxLength: 32
  /DeviceStatus:
    get:
      tags:
        - 2 - Status
      summary: ""
      description: "Returns the device state."
      operationId: Get/DeviceStatus
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      DeviceStatus:
                        $ref: "#/components/schemas/DeviceStatus"
  /WriteEeprom:
    post:
      tags:
        - 1 - General
      summary: ""
      description: |
        Saves all parameters permanently.

         This function requires at least user level: Authorized Client.
      operationId: Post/WriteEeprom
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      Success:
                        type: boolean
                        default: False
  /SoftReset:
    post:
      tags:
        - 1 - General
      summary: ""
      description: |
        Reboots the device. All non-saved parameters are lost. This function requires the user level: Service.

         This function requires at least user level: Authorized Client.
      operationId: Post/SoftReset
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    ProcessorNbr:
                      type: integer
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /RebootDevice:
    post:
      tags:
        - 1 - General
      summary: ""
      description: |
        Reboots the device. All parameters are saved. This function requires the user level: Service.

         This function requires at least user level: Authorized Client.
      operationId: Post/RebootDevice
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /LoadFactoryDefaults:
    post:
      tags:
        - 1 - General
      summary: ""
      description: |
        Resets all parameters to default. This function requires the user level: Service.

         This function requires at least user level: Service.
      operationId: Post/LoadFactoryDefaults
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /LoadApplicationDefaults:
    post:
      tags:
        - 1 - General
      summary: ""
      description: |
        Resets only the user parametrization of the fields, evaluation cases, and parameters under the section "Application". Other parameters like interface settings, echo filter, etc. remain unchanged. This function requires the user level: Service.

         This function requires at least user level: Authorized Client.
      operationId: Post/LoadApplicationDefaults
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /LastParaDate:
    get:
      tags:
        - 19 - Operating data
      summary: ""
      description: "Returns the last date (e.g. 12.11.2024) when a permanent parameter save was executed."
      operationId: Get/LastParaDate
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      LastParaDate:
                        type: string
                        default: "DD.MM.YYYY"
                        maxLength: 10
  /LastParaTime:
    get:
      tags:
        - 19 - Operating data
      summary: ""
      description: "Returns the last time (e.g. 13:24) when a permanent parameter save was executed."
      operationId: Get/LastParaTime
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      LastParaTime:
                        type: string
                        default: "HH:MM"
                        maxLength: 5
  /DoDiagnosisDump:
    post:
      tags:
        - 20 - Diagnostic file
      summary: ""
      description: |
        Creates a diagnostic file (zip file) for further analysis.

         This function requires at least user level: Service.
      operationId: Post/DoDiagnosisDump
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    DoRunlevelLoop:
                      type: boolean
                      default: False
                    Output:
                      type: string
                      default: " "
                      maxLength: 64
                  example:
                    DoRunlevelLoop: True
                    Output: "file"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      Successfull:
                        type: boolean
                        default: False
  /GetDiagnosisDumpInfo:
    post:
      tags:
        - 20 - Diagnostic file
      summary: ""
      description: "Returns additional meta-information about the diagnostic file."
      operationId: Post/GetDiagnosisDumpInfo
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              nullable: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      DiagDumpExists:
                        type: boolean
                        default: False
                      DiagDumpTimestamp:
                        type: integer
  /EtherIPAddress:
    get:
      tags:
        - 9 - Ethernet
      summary: ""
      description: "Returns/sets used static IP address."
      operationId: Get/EtherIPAddress
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      EtherIPAddress:
                        type: array
                        maxItems: 4
                        minItems: 4
                        default: [192, 168, 0, 1]
                        items:
                          type: integer
    post:
      tags:
        - 9 - Ethernet
      summary: ""
      description: |
        Returns/sets used static IP address.

         This function requires at least user level: Authorized Client.
      operationId: Post/EtherIPAddress
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    EtherIPAddress:
                      type: array
                      maxItems: 4
                      minItems: 4
                      default: [192, 168, 0, 1]
                      items:
                        type: integer
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /EtherIPGateAddress:
    get:
      tags:
        - 9 - Ethernet
      summary: ""
      description: "Returns/sets default gateway address."
      operationId: Get/EtherIPGateAddress
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      EtherIPGateAddress:
                        type: array
                        maxItems: 4
                        minItems: 4
                        default: [0, 0, 0, 0]
                        items:
                          type: integer
    post:
      tags:
        - 9 - Ethernet
      summary: ""
      description: |
        Returns/sets default gateway address.

         This function requires at least user level: Authorized Client.
      operationId: Post/EtherIPGateAddress
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    EtherIPGateAddress:
                      type: array
                      maxItems: 4
                      minItems: 4
                      default: [0, 0, 0, 0]
                      items:
                        type: integer
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /EtherIPMask:
    get:
      tags:
        - 9 - Ethernet
      summary: ""
      description: "Returns/sets the subnet mask."
      operationId: Get/EtherIPMask
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      EtherIPMask:
                        type: array
                        maxItems: 4
                        minItems: 4
                        default: [255, 255, 255, 0]
                        items:
                          type: integer
    post:
      tags:
        - 9 - Ethernet
      summary: ""
      description: |
        Returns/sets the subnet mask.

         This function requires at least user level: Authorized Client.
      operationId: Post/EtherIPMask
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
                  type: object
                  properties:
                    EtherIPMask:
                      type: array
                      maxItems: 4
                      minItems: 4
                      default: [255, 255, 255, 0]
                      items:
                        type: integer
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
  /EtherAuxEnabled:
    get:
      tags:
        - 10 - Legacy protocols
      summary: ""
      description: "Enables/disables the legacy interface CoLa A/B. If enabled CoLa A uses port 2111 and CoLa B uses 2112."
      operationId: Get/EtherAuxEnabled
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                required: ["header"]
                properties:
                  header:
                    $ref: "#/components/schemas/ResponseHeader"
                  data:
                    type: object
                    properties:
                      EtherAuxEnabled:
                        type: boolean
                        default: True
    post:
      tags:
        - 10 - Legacy protocols
      summary: ""
      description: |
        Enables/disables the legacy interface CoLa A/B. If enabled CoLa A uses port 2111 and CoLa B uses 2112.

         This function requires at least user level: Authorized Client.
      operationId: Post/EtherAuxEnabled
      requestBody:
        description: successful operation
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                header:
                  $ref: "#/components/schemas/PostBodyHeader"
                data:
